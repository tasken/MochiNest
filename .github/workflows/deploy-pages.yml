name: Deploy to GitHub Pages

"on":
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Prepare site artifact
        run: |
          mkdir -p "$RUNNER_TEMP/site"
          rsync -av \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.local/' \
            --exclude='.cert/' \
            --exclude='upstream/' \
            --exclude='scripts/' \
            --exclude='README.md' \
            --exclude='package.json' \
            --exclude='LICENSE' \
            --exclude='.gitignore' \
            --exclude='.gitmodules' \
            ./ "$RUNNER_TEMP/site/"
          touch "$RUNNER_TEMP/site/.nojekyll"

      - name: Package Pages artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory "$RUNNER_TEMP/site" \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4